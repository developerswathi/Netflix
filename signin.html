<!DOCTYPE html>

<html>
<head>
<title>Netflix Sign In</title>
<link rel="stylesheet" href="css/style.css">

<style>

.signin-page{
height:100vh;
background:url("https://assets.nflxext.com/ffe/siteui/vlv3/9b3edbf2-3812-4f77-8b7a-b67b66a701d0/web/IN-en-20240219-popsignuptwoweeks-perspective_alpha_website_large.jpg");
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
}

.signin-box{
background:rgba(0,0,0,0.75);
padding:40px;
width:350px;
border-radius:5px;
}

.signin-box h2{
margin-bottom:20px;
}

.signin-box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
}

.login-btn{
width:100%;
padding:12px;
background:#e50914;
border:none;
color:white;
font-size:18px;
margin-top:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="signin-page">

<div class="signin-box">

<h2>Sign In</h2>

<input type="text" placeholder="Email or phone number">

<input type="password" placeholder="Password">

<a href="browse.html">
<button class="login-btn">Sign In</button>
</a>

</div>

</div>

</body>
</html>
