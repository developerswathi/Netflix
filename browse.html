<!-- VIDEO POPUP PLAYER -->

<div class="popup" id="videoPopup">

<span class="close" onclick="closeVideo()">×</span>

<iframe id="movieFrame" src="" allowfullscreen></iframe>

</div>

<script>

function playMovie(id){
document.getElementById("videoPopup").style.display="flex";
document.getElementById("movieFrame").src="https://www.youtube.com/embed/"+id;
}

function closeVideo(){
document.getElementById("videoPopup").style.display="none";
document.getElementById("movieFrame").src="";
}



/* AUTO SLIDER FOR ALL ROWS */

function autoScroll(rowId){

const slider=document.getElementById(rowId);

setInterval(function(){

slider.scrollLeft+=200;

if(slider.scrollLeft>=slider.scrollWidth-slider.clientWidth){
slider.scrollLeft=0;
}

},2500);

}

autoScroll("row1");
autoScroll("row2");
autoScroll("row3");
autoScroll("row4");

</script>
